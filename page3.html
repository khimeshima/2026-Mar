<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>KPIグラフ3 - EVトラブル問合せ</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    body {
      font-family: "Meiryo", "Yu Gothic", sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #333;
      font-size: 18px;
      margin-bottom: 30px;
    }
    .chart-container {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 24px;
      margin-bottom: 40px;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }
    .chart-title {
      font-size: 16px;
      font-weight: bold;
      color: #222;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid #1a73e8;
    }
    canvas {
      max-height: 400px;
    }
  </style>
</head>
<body>

<h1>KPIグラフ（2024年10月～2026年3月）</h1>

<!-- グラフ⑥ -->
<div class="chart-container">
  <div class="chart-title">⑥ EVトラブル・使用についての問合せ件数</div>
  <canvas id="chart7"></canvas>
</div>

<script>
const labels = [
  'Oct-24','Nov-24','Dec-24','Jan-25','Feb-25','Mar-25',
  'Apr-25','May-25','Jun-25','Jul-25','Aug-25','Sep-25',
  'Oct-25','Nov-25','Dec-25','Jan-26','Feb-26','Mar-26'
];

// A: EV専用ホットライン　問い合わせ件数
const dataA = [40, 25, 46, 50, 44, 70, 93, 101, 111, 106, 196, 181, 273, 291, 286, 313, 263, 340];

// B: 本社　問い合わせ件数
const dataB = [0, 0, 22, 19, 30, 36, 22, 37, 30, 30, 37, 37, 42, 48, 48, 27, 29, 43];

// 積み上げ合計ラベルプラグイン
const totalLabelPlugin = {
  id: 'totalLabel',
  afterDatasetsDraw(chart) {
    const { ctx, scales: { x, y } } = chart;
    ctx.save();
    ctx.font = 'bold 12px "Meiryo", sans-serif';
    ctx.fillStyle = '#333';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    chart.data.labels.forEach((_, i) => {
      const total = chart.data.datasets.reduce((s, ds, di) =>
        s + (chart.isDatasetVisible(di) ? (ds.data[i] || 0) : 0), 0);
      const xPos = x.getPixelForValue(i);
      const yPos = y.getPixelForValue(total);
      ctx.fillText(total.toLocaleString(), xPos, yPos - 4);
    });
    ctx.restore();
  }
};

new Chart(document.getElementById('chart7'), {
  type: 'bar',
  data: {
    labels,
    datasets: [
      {
        label: 'EV専用ホットライン　問い合わせ件数',
        data: dataA,
        backgroundColor: 'rgba(26,115,232,0.85)',
        borderColor: '#1a73e8',
        borderWidth: 1,
      },
      {
        label: '本社　問い合わせ件数',
        data: dataB,
        backgroundColor: 'rgba(251,188,5,0.85)',
        borderColor: '#fbbc05',
        borderWidth: 1,
      },
    ]
  },
  options: {
    responsive: true,
    plugins: {
      legend: { position: 'bottom' },
      tooltip: {
        callbacks: {
          label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString()}件`
        }
      }
    },
    scales: {
      x: { stacked: true },
      y: {
        stacked: true,
        min: 0,
        max: 400,
        ticks: {
          stepSize: 50,
          callback: v => v.toLocaleString()
        },
        title: { display: true, text: '件数' }
      }
    }
  },
  plugins: [totalLabelPlugin]
});
</script>

</body>
</html>
