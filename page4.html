<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>KPIグラフ4 - 商材問合せ</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    body {
      font-family: "Meiryo", "Yu Gothic", sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #333;
      font-size: 18px;
      margin-bottom: 30px;
    }
    .chart-container {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);

      margin-bottom: 40px;

      margin-left: auto;
      margin-right: auto;
    }
    .chart-title {
      font-size: 16px;
      font-weight: bold;
      color: #222;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 2px solid #1a73e8;
    }
    .ev-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 10px;
      color: #444;
    }

      max-height: 400px;

    }
    .chart-scroll {
      overflow-x: auto;
    }
    .yaxis-overlay {
      position: absolute;
      top: 0;

      z-index: 2;

      display: block;
    }
  </style>
</head>
<body>

<h1>KPIグラフ（2025年4月〜2026年3月）</h1>

<!-- グラフ⑦ -->
<div class="chart-container">
  <div class="chart-title">⑦ 商材問合せ案件推移（電話＋メール＋WEB）</div>
  <label class="ev-toggle"><input type="checkbox" id="ev7" checked onchange="toggleEV(chart7, allLabels7, allData7, this.checked)"> EV 表示</label>

  </div>
</div>

<!-- グラフ⑧ -->
<div class="chart-container">
  <div class="chart-title">⑧ 3月 商材問合せ手段</div>
  <label class="ev-toggle"><input type="checkbox" id="ev8" checked onchange="toggleEV(chart8, allLabels8, allData8, this.checked)"> EV 表示</label>

</div>

<!-- グラフ⑨ -->
<div class="chart-container">

<!-- グラフ⑩ -->
<div class="chart-container">
  <div class="chart-title">⑩ 3月 購入問合せ手段</div>
  <label class="ev-toggle"><input type="checkbox" id="ev10" checked onchange="toggleEV(chart10, allLabels10, allData10, this.checked)"> EV投資 表示</label>
  <canvas id="chart10"></canvas>
</div>

<script>
// =====================================================
// EV ON/OFF 汎用トグル関数
// EV/EV投資 は常にインデックス 0 の位置
// =====================================================
function toggleEV(chartObj, fullLabels, fullDataValues, show) {
  if (show) {
    chartObj.data.labels = fullLabels.slice();
    chartObj.data.datasets.forEach((ds, i) => { ds.data = fullDataValues[i].slice(); });
  } else {
    chartObj.data.labels = fullLabels.slice(1);
    chartObj.data.datasets.forEach((ds, i) => { ds.data = fullDataValues[i].slice(1); });
  }
  // Y軸は常にオートスケール（min:0 のみ固定）
  chartObj.options.scales.y.max = undefined;
  chartObj.update();
}

// =====================================================
// Y軸固定オーバーレイ プラグイン（⑦⑨用）
// =====================================================
const stickyAxisPlugin = {
  id: 'stickyAxis',
  afterRender(chart) {
    const overlay = document.getElementById(chart.canvas.id + '-yaxis');
    if (!overlay) return;
    const axisW = Math.ceil(chart.chartArea.left);
    const chartH = chart.height;
    overlay.style.width  = axisW + 'px';
    overlay.style.height = chartH + 'px';
    overlay.width  = axisW;
    overlay.height = chartH;
    const dpr = chart.canvas.width / chart.width;
    const ctx2 = overlay.getContext('2d');
    ctx2.fillStyle = 'white';
    ctx2.fillRect(0, 0, axisW, chartH);
    ctx2.drawImage(
      chart.canvas,
      0, 0, axisW * dpr, chartH * dpr,
      0, 0, axisW, chartH
    );
  }
};

// =====================================================
// channelColor（⑧⑩用）
// =====================================================
const channelColor = {
  '電話': { bg: 'rgba(26,115,232,0.85)',  bd: '#1a73e8' },
  'メール':{ bg: 'rgba(52,168,83,0.85)',  bd: '#34a853' },
  'WEB他': { bg: 'rgba(234,67,53,0.85)', bd: '#ea4335' },
};

// =====================================================
// 積み上げ合計ラベルプラグイン（⑧⑩用）
// =====================================================
function makeTotalPlugin(id, getLabels, getDatasets) {
  return {
    id,
    afterDatasetsDraw(chart) {
      const { ctx, scales: { x, y } } = chart;
      ctx.save();
      ctx.font = 'bold 11px "Meiryo", sans-serif';
      ctx.fillStyle = '#333';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      const labels = chart.data.labels;
      labels.forEach((_, i) => {
        const total = chart.data.datasets.reduce((s, ds, di) =>
          s + (chart.isDatasetVisible(di) ? (ds.data[i] || 0) : 0), 0);
        ctx.fillText(total.toLocaleString(), x.getPixelForValue(i), y.getPixelForValue(total) - 4);
      });
      ctx.restore();
    }
  };
}

// =====================================================
// グラフ⑦：商材問合せ案件推移（カテゴリ×月 グループ棒）
// 3月件数Top9順：EV投資(909)→ストーンフロア(60)→ダーツマシン(50)→
//   サイネージ(46)→イージーオーダー(46)→ビール(41)→太陽光(28)→ヤギ(8)→コンテナ投資(7)
// =====================================================
const allLabels7 = ['EV','ストーンフロア','ダーツマシン','サイネージ',
                    'イージーオーダー','ビール','太陽光','ヤギ','コンテナ投資'];

// 各月のデータ（列順 = allLabels7 順）
// EV投資, ストーンフロア, ダーツマシン, サイネージ, イージーオーダー, ビール, 太陽光, ヤギ, コンテナ投資

  { label: '7月',  color: '#222222', data: [611,  0, 42, 115,  1, 44, 30,  8,  8] },
  { label: '8月',  color: '#222222', data: [607, 83, 69,  86,  9, 30,  9,  8, 18] },

  { label: '10月', color: '#222222', data: [720, 73, 51,  34, 24, 19,  3,  7,  4] },
  { label: '11月', color: '#222222', data: [709, 73, 60,  19, 23, 34,  8,  5,  2] },
  { label: '12月', color: '#222222', data: [729, 56, 58,  64, 29,  7,  2, 10,  2] },
  { label: '1月',  color: '#222222', data: [798, 73, 62,  51, 51, 46,  2,  6,  4] },
  { label: '2月',  color: '#222222', data: [739, 73, 58,  55, 51, 37,  3,  9,  2] },
  { label: '3月',  color: '#FFFF00', data: [909, 60, 50,  46, 46, 41, 28,  8,  7] },
];
// トグル用に全データを保持
const allData7 = monthDefs7.map(m => m.data.slice());

const chart7 = new Chart(document.getElementById('chart7'), {
  type: 'bar',
  data: {
    labels: allLabels7.slice(),
    datasets: monthDefs7.map((m, i) => ({
      label: m.label,
      data: allData7[i].slice(),
      backgroundColor: m.color,
      borderColor: m.color === '#FFFF00' ? '#000000' : m.color,
      borderWidth: m.color === '#FFFF00' ? 1 : 0,
    }))
  },
  options: {
    responsive: false,
    plugins: {
      legend: { position: 'top', align: 'end', labels: { font: { size: 10 }, boxWidth: 12 } },
      tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString()}件` } }
    },
    scales: {
      x: { stacked: false, ticks: { font: { size: 10 }, maxRotation: 30 } },
      y: { stacked: false, min: 0, ticks: { callback: v => v.toLocaleString() }, title: { display: true, text: '件数' } }
    }
  },
  plugins: [stickyAxisPlugin]
});

// =====================================================

      y: { stacked: true, min: 0, ticks: { callback: v => v.toLocaleString() }, title: { display: true, text: '件数' } }

  },
  plugins: [makeTotalPlugin('t8')]

// EV投資, ストーンフロア, イージーオーダー, サイネージ無料設置, ダーツマシン, EV無料設置, ビール, 太陽光, ヤギ

    }
  },

});

// =====================================================
// グラフ⑩：3月 購入問合せ手段（積み上げ棒）
// ラベル順 = allLabels9（⑨と同じ並び）
// EV投資, ストーンフロア, イージーオーダー, サイネージ無料設置, ダーツマシン, EV無料設置, ビール, 太陽光, ヤギ
// =====================================================
const allLabels10 = ['EV投資','ストーンフロア','イージーオーダー','サイネージ無料設置',
                     'ダーツマシン','EV無料設置','ビール','太陽光','ヤギ'];

const rawDefs10 = [
  { name: '電話',  data: [ 1,  0,  2,  0,  9,  7,  1,  1, 2] },

</script>

</body>
</html>
